name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller reportlab

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name GreenTest green_test.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GreenTest-Windows
          path: dist/GreenTest.exe
