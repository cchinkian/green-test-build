name: Build Windows EXEs

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller reportlab pypdf openpyxl PyMuPDF

      - name: Build GreenTest.exe
        run: pyinstaller --onefile --windowed --name GreenTest green_test.py

      - name: Build FormFiller.exe
        run: pyinstaller --onefile --windowed --name FormFiller src/main_app.py

      - name: Stage portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "FormFiller-portable"
          Copy-Item "dist\FormFiller.exe"  "FormFiller-portable\"
          Copy-Item "dist\GreenTest.exe"   "FormFiller-portable\"
          Copy-Item -Recurse "config"      "FormFiller-portable\"
          New-Item -ItemType Directory -Path "FormFiller-portable\data"
          Copy-Item "data\clients_template.xlsx" "FormFiller-portable\data\"
          # Rename settings.example.json → settings.json as the starter config
          Copy-Item "config\settings.example.json" "FormFiller-portable\config\settings.json"
          # Remove _comment keys from shipped forms.json (keep clean)
          Write-Host "Package staged."

      - name: Upload GreenTest (standalone)
        uses: actions/upload-artifact@v4
        with:
          name: GreenTest-Windows
          path: dist/GreenTest.exe

      - name: Upload FormFiller portable package
        uses: actions/upload-artifact@v4
        with:
          name: FormFiller-portable
          path: FormFiller-portable/
